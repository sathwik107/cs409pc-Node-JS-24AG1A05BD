<!DOCTYPE html> 
<!-- 
Experiment 1 
Responsive Shopping Cart Web Application 
Home Page (index.html) --> 
<html lang="en"> 
<head> 
<!-- Character encoding --> 
<meta charset="UTF-8"> 
<!-- Makes website responsive on mobile devices --> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<!-- Page Title --> 
<title>Shopping Cart - Home</title> 
<!-- External CSS file --><link rel="stylesheet" href="css/style.css"> 
</head> 
 
<body> 
 
    <!-- ================= NAVIGATION BAR ================= --> 
    <!-- 
        This section contains the navigation links. 
        We will use Flexbox in CSS to align items horizontally. 
    --> 
    <header> 
        <nav class="navbar"> 
 
            <!-- Website Logo / Title --> 
            <div class="logo"> 
                <h2>MyShop</h2> 
            </div> 
 
            <!-- Navigation Links --> 
            <ul class="nav-links"> 
                <li><a href="index.html">Home</a></li> 
                <li><a href="catalog.html">Catalog</a></li> 
                <li><a href="cart.html">Cart</a></li> 
                <li><a href="login.html">Login</a></li> 
                <li><a href="register.html">Register</a></li> 
            </ul> 
 
        </nav> 
    </header> 
 
 
    <!-- ================= HERO SECTION ================= --> 
    <!-- 
        This is the main landing section. 
        We will use CSS Grid to split content into two columns. 
    --> 
    <section class="hero"> 
 
        <!-- Left Side Content --> 
        <div class="hero-text"> 
            <h1>Welcome to MyShop</h1> 
            <p> 
                Your one-stop destination for amazing products at unbeatable 
prices. 
                Explore our catalog and start shopping today! 
            </p> 
 
            <!-- Call to Action Button --> 
            <a href="catalog.html" class="btn">Shop Now</a> 
        </div> 
 
        <!-- Right Side Image --><div class="hero-image"> 
<!-- Placeholder image --> 
<img src="https://via.placeholder.com/400x300" alt="Shopping Image"> 
</div> 
</section> 
<!-- ================= FOOTER ================= --> 
<footer> 
<p>&copy; 2026 MyShop | Designed for Web Technology Lab</p> 
</footer> 
</body> 
</html>
